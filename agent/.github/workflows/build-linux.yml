name: Build Linux

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

defaults:
  run:
    working-directory: agent

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev libcups2-dev python3-tk dpkg-dev

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary (PyInstaller)
        run: |
          rm -rf build dist
          pyinstaller --onefile --windowed --name "KitsDirectPrintAgent" --icon=icon.png main.py

      - name: Verify binary exists
        run: test -f dist/KitsDirectPrintAgent

      - name: Build .deb package
        run: |
          chmod +x build_deb.sh
          ./build_deb.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: KitsDirectPrintAgent-linux-binary
          path: agent/dist/KitsDirectPrintAgent

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: KitsDirectPrintAgent-linux-deb
          path: agent/dist/kits-direct-print-agent_*_amd64.deb

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/dist/KitsDirectPrintAgent
            agent/dist/kits-direct-print-agent_*_amd64.deb
