name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

defaults:
  run:
    working-directory: agent

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build EXE (PyInstaller)
        run: pyinstaller --clean --noconfirm KitsDirectPrintAgent.spec

      - name: Verify EXE exists
        run: |
          if (-not (Test-Path "dist\KitsDirectPrintAgent.exe")) {
            Write-Error "dist\KitsDirectPrintAgent.exe was not produced"
            exit 1
          }

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: KitsDirectPrintAgent-windows-exe
          path: agent/dist/KitsDirectPrintAgent.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KitsDirectPrintAgent-windows-installer
          path: agent/Output/KitsDirectPrintAgentSetup.exe

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/dist/KitsDirectPrintAgent.exe
            agent/Output/KitsDirectPrintAgentSetup.exe
