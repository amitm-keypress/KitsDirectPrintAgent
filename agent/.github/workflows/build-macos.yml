name: Build macOS

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

defaults:
  run:
    working-directory: agent

jobs:
  build-macos:
    # Apple Silicon (arm64) runner. Add a second job with
    # runs-on: macos-13 (Intel) if you also need a native x86_64 build -
    # PyInstaller builds only for the arch of the interpreter it runs
    # under, it does not produce a universal2 binary unless you install
    # a universal2 Python (e.g. python.org installer) yourself.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app (PyInstaller)
        run: |
          rm -rf build dist
          pyinstaller --clean --noconfirm KitsDirectPrintAgent_mac.spec

      - name: Verify .app exists
        run: test -d "dist/KitsDirectPrintAgent.app"

      - name: Build .dmg
        run: |
          STAGING_DIR="dist/dmg_staging"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "dist/KitsDirectPrintAgent.app" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"
          hdiutil create -volname "KitsDirectPrintAgent" \
            -srcfolder "$STAGING_DIR" -ov -format UDZO \
            "dist/KitsDirectPrintAgent.dmg"
          rm -rf "$STAGING_DIR"

      - name: Build .pkg
        run: |
          pkgbuild --install-location /Applications \
            --component "dist/KitsDirectPrintAgent.app" \
            --identifier com.keypressit.kitsdirectprintagent \
            --version 1.0.0 \
            "dist/KitsDirectPrintAgent.pkg"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: KitsDirectPrintAgent-macos-app
          path: agent/dist/KitsDirectPrintAgent.app

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: KitsDirectPrintAgent-macos-dmg
          path: agent/dist/KitsDirectPrintAgent.dmg

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: KitsDirectPrintAgent-macos-pkg
          path: agent/dist/KitsDirectPrintAgent.pkg

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/dist/KitsDirectPrintAgent.dmg
            agent/dist/KitsDirectPrintAgent.pkg
